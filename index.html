<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Точка опоры | Пустая форма</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow-x: hidden;
            background-color: #02010a;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            position: relative;
            min-height: 100vh;
        }

        /* 3D Canvas BG */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        /* Main UI Layer */
        .app-wrapper {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            padding: 24px 20px 60px;
            backdrop-filter: blur(2px);
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
        }

        /* Typography & Cards (темная полупрозрачная эстетика) */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 600;
            background: linear-gradient(135deg, #FFE6A3 0%, #D4AF37 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .tagline {
            font-size: 14px;
            color: rgba(255, 245, 200, 0.8);
            font-style: italic;
            letter-spacing: 1px;
        }

        .btn-buy-all {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.9) 0%, rgba(230, 200, 100, 0.9) 100%);
            border: 1px solid rgba(255, 215, 0, 0.7);
            color: #1a1408;
            font-weight: 700;
            padding: 14px 20px;
            border-radius: 60px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin: 10px 0 20px;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.3);
        }

        .btn-buy-all:hover {
            transform: scale(0.98);
            background: linear-gradient(135deg, #D4AF37, #F3D572);
            box-shadow: 0 0 18px gold;
        }

        .grid-2x2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 32px 0;
        }

        .key-card {
            background: rgba(10, 8, 20, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 24px 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.25s;
            border: 1px solid rgba(212, 175, 55, 0.5);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .key-card:hover {
            transform: translateY(-4px);
            background: rgba(20, 15, 35, 0.8);
            border-color: #D4AF37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        .key-number {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 700;
            color: #FFDF8C;
            margin-bottom: 8px;
        }

        .key-name {
            font-size: 15px;
            font-weight: 500;
            color: #F5E7C8;
        }

        .status-badge {
            font-size: 11px;
            margin-top: 8px;
            font-weight: 400;
        }

        .status-open {
            color: #A8E6A2;
            text-shadow: 0 0 3px #2e7d32;
        }

        .status-closed {
            color: #D4AF37;
        }

        .status-locked {
            color: #D4AF37;
            opacity: 0.8;
        }

        .btn-donate {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(212, 175, 55, 0.6);
            color: #FFE5A3;
            font-weight: 600;
            padding: 12px 20px;
            border-radius: 60px;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            margin: 30px 0 10px;
            transition: 0.2s;
            backdrop-filter: blur(5px);
        }

        .btn-donate:hover {
            background: rgba(212, 175, 55, 0.2);
            border-color: #D4AF37;
        }

        /* Meditation cards — полупрозрачные, с золотым свечением */
        .meditation-card {
            background: rgba(8, 6, 18, 0.75);
            backdrop-filter: blur(14px);
            border-radius: 48px;
            padding: 28px 24px;
            margin: 16px 0;
            border: 1px solid rgba(212, 175, 55, 0.5);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.2s ease;
            color: #f0ede8;
        }

        .med-title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, #FFE6A3, #D4AF37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }

        .med-sub {
            font-size: 15px;
            color: rgba(255, 245, 210, 0.85);
            margin-bottom: 24px;
            border-left: 2px solid #D4AF37;
            padding-left: 16px;
        }

        .btn-audio {
            background: linear-gradient(95deg, #D4AF37, #B58F2A);
            border: none;
            color: #1f1b0c;
            font-weight: 700;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-top: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .btn-audio:hover:not(:disabled) {
            background: linear-gradient(95deg, #E5C45A, #C9A53B);
            transform: scale(0.98);
        }

        .btn-audio.disabled,
        .btn-audio:disabled {
            background: #6a5a2e;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid #D4AF37;
            color: #FFE6A3;
        }

        .back-home, .back-to-start {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(212, 175, 55, 0.6);
            color: #FFE9B6;
            font-size: 13px;
            padding: 8px 14px;
            border-radius: 40px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-right: 12px;
            backdrop-filter: blur(4px);
            transition: 0.2s;
        }

        .back-home:hover, .back-to-start:hover {
            background: rgba(212, 175, 55, 0.2);
            border-color: #FFD966;
        }

        .hidden {
            display: none;
        }

        .custom-player {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 60px;
            padding: 18px 20px;
            margin: 20px 0;
            border: 1px solid rgba(212, 175, 55, 0.5);
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .play-btn {
            background: #D4AF37;
            border: none;
            color: #1c1606;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 22px;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 0 6px gold;
        }

        .play-btn:hover {
            background: #f3cd65;
            transform: scale(0.96);
        }

        .time {
            font-size: 14px;
            color: #FFECB3;
            font-family: monospace;
            min-width: 100px;
            text-align: center;
        }

        .seek-bar {
            flex: 2;
            min-width: 140px;
            height: 5px;
            -webkit-appearance: none;
            background: #3a2e1a;
            border-radius: 10px;
            cursor: pointer;
        }

        .seek-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #FFD966;
            border-radius: 50%;
            cursor: pointer;
        }

        .speed-select {
            background: #1f1c10;
            border: 1px solid #D4AF37;
            border-radius: 40px;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 500;
            color: #FFE6A3;
            cursor: pointer;
        }

        .image-container {
            margin: 20px 0;
            text-align: center;
        }

        .image-container img {
            max-width: 100%;
            border-radius: 24px;
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.3);
        }

        .quiz-question {
            margin: 20px 0;
            background: rgba(0, 0, 0, 0.4);
            padding: 16px;
            border-radius: 24px;
            font-style: normal;
            border-left: 3px solid #D4AF37;
        }

        .error-message {
            background: rgba(180, 60, 50, 0.8);
            backdrop-filter: blur(10px);
            padding: 18px;
            border-radius: 32px;
            text-align: center;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #D4AF37;
            border-top-color: #FFD966;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* FULLSCREEN АУДИО-ПЛЕЕР стиль (разворот на весь экран) */
        .fullscreen-audio-card {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 1, 12, 0.85);
            backdrop-filter: blur(20px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            animation: fadeInUp 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border-radius: 0;
            margin: 0;
            padding: 24px;
            overflow-y: auto;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fullscreen-audio-card .meditation-card {
            background: rgba(10, 8, 25, 0.7);
            backdrop-filter: blur(24px);
            width: 90%;
            max-width: 500px;
            border-radius: 60px;
            border: 1px solid rgba(212, 175, 55, 0.7);
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }

        /* остальные карточки остаются в обычном потоке */
        .note {
            font-size: 11px;
            color: rgba(212, 175, 55, 0.8);
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <!-- 3D Canvas фон (Пустая форма) -->
    <div id="canvas-container"></div>

    <div class="app-wrapper">
        <div class="app-container" id="mainAppContainer">
            <div id="homeScreen">
                <div class="header">
                    <div class="brand">Точка опоры</div>
                    <div class="tagline">«Не волшебная таблетка, но близко»</div>
                </div>
                <button id="buyAllBtn" class="btn-buy-all">🎁 Купить все ключи (2+3+4) — 2990 ₽</button>
                <div class="grid-2x2">
                    <div class="key-card" data-key="key1"><div class="key-number">КЛЮЧ 1</div><div class="key-name">5 врат</div><div class="status-badge status-open">✓ открыт доступ</div></div>
                    <div class="key-card" data-key="key2"><div class="key-number">КЛЮЧ 2</div><div class="key-name">Золотое сияние</div><div class="status-badge" id="key2Status">🔒 закрыт доступ</div></div>
                    <div class="key-card" data-key="key3"><div class="key-number">КЛЮЧ 3</div><div class="key-name">Искусство быть</div><div class="status-badge" id="key3Status">🔒 закрыт доступ</div></div>
                    <div class="key-card" data-key="key4"><div class="key-number">КЛЮЧ 4</div><div class="key-name">Субстрат жизненности</div><div class="status-badge" id="key4Status">🔒 закрыт доступ</div></div>
                </div>
                <button id="donateBtn" class="btn-donate">👋 Передать привет автору</button>
                <div class="note">нажмите на ключ, чтобы начать практику</div>
            </div>
            <div id="dynamicPanel" class="hidden"></div>
        </div>
    </div>

    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // ======================== THREE.JS ФОН (Пустая форма) ========================
        (function initCosmicBackground() {
            const scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x02010a, 0.05);
            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1, 7);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            const universeGroup = new THREE.Group();
            const entityGroup = new THREE.Group();
            const bodyGroup = new THREE.Group();
            scene.add(universeGroup);
            scene.add(entityGroup);
            entityGroup.add(bodyGroup);
            
            // Stars
            const starGeo = new THREE.BufferGeometry();
            const starCount = 3000;
            const starPos = new Float32Array(starCount * 3);
            const starColors = new Float32Array(starCount * 3);
            const colorPalette = [0xffffff, 0xffd700, 0x88ccff, 0xffb288];
            for(let i=0; i<starCount; i++) {
                const r = 10 + Math.random() * 40;
                const theta = 2 * Math.PI * Math.random();
                const phi = Math.acos(2 * Math.random() - 1);
                starPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
                starPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
                starPos[i*3+2] = r * Math.cos(phi);
                const col = new THREE.Color(colorPalette[Math.floor(Math.random() * colorPalette.length)]);
                starColors[i*3] = col.r;
                starColors[i*3+1] = col.g;
                starColors[i*3+2] = col.b;
            }
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            starGeo.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
            const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ size: 0.05, vertexColors: true, transparent: true, opacity: 0.8 }));
            universeGroup.add(stars);
            
            // body particles
            const bodyPoints = [];
            function addVolumePoints(radius, height, count, offset, isSphere=true) {
                for(let i=0;i<count;i++) {
                    let x,y,z;
                    if(isSphere){
                        const u=Math.random(), v=Math.random();
                        const theta=u*2*Math.PI, phi=Math.acos(2*v-1);
                        const r=Math.cbrt(Math.random())*radius;
                        x=r*Math.sin(phi)*Math.cos(theta);
                        y=r*Math.sin(phi)*Math.sin(theta);
                        z=r*Math.cos(phi);
                    } else {
                        const theta=Math.random()*2*Math.PI;
                        const r=Math.sqrt(Math.random())*radius;
                        x=r*Math.cos(theta);
                        z=r*Math.sin(theta);
                        y=(Math.random()-0.5)*height;
                    }
                    bodyPoints.push(x+offset.x, y+offset.y, z+offset.z);
                }
            }
            addVolumePoints(0.25,0,800,{x:0,y:1.3,z:0});
            addVolumePoints(0.35,1.2,1500,{x:0,y:0.5,z:0},false);
            addVolumePoints(0.5,0.2,1000,{x:0,y:-0.1,z:0.1},false);
            addVolumePoints(0.12,0.8,400,{x:-0.45,y:0.5,z:0},false);
            addVolumePoints(0.12,0.8,400,{x:0.45,y:0.5,z:0},false);
            const bodyGeo = new THREE.BufferGeometry();
            bodyGeo.setAttribute('position', new THREE.Float32BufferAttribute(bodyPoints, 3));
            const particleBody = new THREE.Points(bodyGeo, new THREE.PointsMaterial({ color: 0xffd700, size: 0.02, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending, depthWrite: false }));
            bodyGroup.add(particleBody);
            
            function createCenter(color, yPos, size){
                const mesh=new THREE.Mesh(new THREE.SphereGeometry(size,16,16), new THREE.MeshBasicMaterial({color, transparent:true, opacity:0.8, blending:THREE.AdditiveBlending}));
                mesh.position.y=yPos;
                const glow=new THREE.Mesh(new THREE.SphereGeometry(size*2.5,16,16), new THREE.MeshBasicMaterial({color, transparent:true, opacity:0.2, blending:THREE.AdditiveBlending, depthWrite:false}));
                mesh.add(glow);
                mesh.add(new THREE.PointLight(color,1,2));
                return mesh;
            }
            bodyGroup.add(createCenter(0xff7700,0.1,0.08), createCenter(0xffb288,0.7,0.08), createCenter(0xffffff,1.35,0.05));
            
            const idealSphere=new THREE.Mesh(new THREE.SphereGeometry(0.15,32,32), new THREE.MeshBasicMaterial({color:0xffffff, transparent:true, opacity:0.9, blending:THREE.AdditiveBlending}));
            idealSphere.position.y=2.2;
            const idealGlow=new THREE.Mesh(new THREE.SphereGeometry(0.6,32,32), new THREE.MeshBasicMaterial({color:0xfff0aa, transparent:true, opacity:0.3, blending:THREE.AdditiveBlending}));
            idealSphere.add(idealGlow);
            idealSphere.add(new THREE.PointLight(0xffffff,2,5));
            entityGroup.add(idealSphere);
            
            const core=new THREE.Mesh(new THREE.CylinderGeometry(0.015,0.015,8,8), new THREE.MeshBasicMaterial({color:0xffeaa0, transparent:true, opacity:0.6, blending:THREE.AdditiveBlending}));
            core.position.y=-1;
            entityGroup.add(core);
            const crystal=new THREE.Mesh(new THREE.ConeGeometry(0.3,1,6), new THREE.MeshBasicMaterial({color:0x88ccff, transparent:true, opacity:0.7, blending:THREE.AdditiveBlending, wireframe:true}));
            crystal.position.y=-3;
            crystal.rotation.x=Math.PI;
            entityGroup.add(crystal);
            const cocoon=new THREE.Mesh(new THREE.SphereGeometry(1.4,24,24), new THREE.MeshBasicMaterial({color:0xffd700, wireframe:true, transparent:true, opacity:0.05, blending:THREE.AdditiveBlending}));
            cocoon.scale.set(1,1.4,1);
            cocoon.position.y=0.6;
            entityGroup.add(cocoon);
            
            const cascadeCount=100;
            const cascadeGeo=new THREE.BufferGeometry();
            const cascadePos=new Float32Array(cascadeCount*3);
            for(let i=0;i<cascadeCount;i++){ cascadePos[i*3]=(Math.random()-0.5)*0.1; cascadePos[i*3+1]=2.2-Math.random()*5.2; cascadePos[i*3+2]=(Math.random()-0.5)*0.1; }
            cascadeGeo.setAttribute('position', new THREE.BufferAttribute(cascadePos,3));
            const cascade=new THREE.Points(cascadeGeo, new THREE.PointsMaterial({color:0xffffff, size:0.03, transparent:true, opacity:0.8, blending:THREE.AdditiveBlending}));
            entityGroup.add(cascade);
            
            let timeAnim=0;
            function animateBackground(){
                requestAnimationFrame(animateBackground);
                timeAnim+=0.016;
                const breath=Math.sin(timeAnim*1.5);
                bodyGroup.scale.set(1+breath*0.015,1+breath*0.015,1+breath*0.015);
                cocoon.material.opacity=0.05+(Math.sin(timeAnim*2)+1)*0.03;
                cocoon.rotation.y+=0.002;
                const pulse=(Math.sin(timeAnim*3)+1)*0.5;
                idealGlow.scale.set(1+pulse*0.2,1+pulse*0.2,1+pulse*0.2);
                crystal.rotation.y+=0.01;
                universeGroup.rotation.y-=0.0005;
                universeGroup.rotation.x=Math.sin(timeAnim*0.05)*0.1;
                const positions=cascade.geometry.attributes.position.array;
                for(let i=1;i<positions.length;i+=3){ positions[i]-=0.025; if(positions[i]<-3) positions[i]=2.2; }
                cascade.geometry.attributes.position.needsUpdate=true;
                camera.position.x=Math.sin(timeAnim*0.1)*6;
                camera.position.z=Math.cos(timeAnim*0.1)*6;
                camera.position.y=1+Math.sin(timeAnim*0.2)*1.5;
                camera.lookAt(0,0.8,0);
                renderer.render(scene,camera);
            }
            animateBackground();
            window.addEventListener('resize',()=>{ camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth,window.innerHeight); });
        })();
        
        // ======================== ОСНОВНАЯ ЛОГИКА ПРИЛОЖЕНИЯ ========================
        const WORKER_URL = 'https://checker.mirhaet83.workers.dev';
        const TRIBUTE_LINKS = {
            key2: 'https://t.me/tribute/app?startapp=pub9',
            key3: 'https://t.me/tribute/app?startapp=pubx',
            key4: 'https://t.me/tribute/app?startapp=puby',
            all: 'https://t.me/tribute/app?startapp=pubz',
            donate: 'https://t.me/tribute/app?startapp=dJwq'
        };
        const AUDIO_URLS = {
            setup: "https://files.catbox.moe/qipf0o.mp3",
            key1: "https://files.catbox.moe/udem2c.mp3",
            integration: "https://files.catbox.moe/vmafp1.mp3",
            bonus: "https://files.catbox.moe/mhz6kz.mp3"
        };
        
        let userStatus = { key2: false, key3: false, key4: false };
        let completed = { key2: false, key3: false };
        let welcomeShown = { key2: false, key3: false, key4: false };
        let currentContent = null, currentStepIndex = 0, stepHistory = [];
        let activeAudio = null;
        let freeStepIndex=0, freeHistory=[], freeAudio=null;
        
        function stopActiveAudio(){ if(activeAudio){ activeAudio.pause(); activeAudio=null; } if(freeAudio){ freeAudio.pause(); freeAudio=null; } }
        
        async function loadUserStatus() {
            const webApp = window.Telegram?.WebApp;
            if(!webApp?.initData) return;
            try{
                const resp=await fetch(`${WORKER_URL}/user-status?initData=${encodeURIComponent(webApp.initData)}`);
                if(resp.ok) { const data=await resp.json(); userStatus={ key2:!!data.key2, key3:!!data.key3, key4:!!data.key4 }; updateStatusUI(); }
            } catch(e){}
        }
        
        function updateStatusUI(){
            const k2=document.getElementById('key2Status'); if(k2){ k2.innerHTML=userStatus.key2?'✓ открыт доступ':'🔒 закрыт доступ'; k2.className=userStatus.key2?'status-badge status-open':'status-badge status-closed';}
            const k3=document.getElementById('key3Status'); if(k3){ if(!userStatus.key3) k3.innerHTML='🔒 закрыт доступ'; else if(userStatus.key3 && !completed.key2) k3.innerHTML='🔓 сначала пройдите КЛЮЧ 2'; else k3.innerHTML='✓ открыт доступ'; k3.className=(userStatus.key3 && completed.key2)?'status-badge status-open':(userStatus.key3?'status-badge status-locked':'status-badge status-closed');}
            const k4=document.getElementById('key4Status'); if(k4){ if(!userStatus.key4) k4.innerHTML='🔒 закрыт доступ'; else if(userStatus.key4 && (!completed.key2 || !completed.key3)) k4.innerHTML='🔓 сначала пройдите КЛЮЧ 2 и КЛЮЧ 3'; else k4.innerHTML='✓ открыт доступ'; k4.className=(userStatus.key4 && completed.key2 && completed.key3)?'status-badge status-open':'status-badge status-locked';}
        }
        
        function openTributePayment(link, keyId){ if(window.Telegram?.WebApp) window.Telegram.WebApp.openLink(link); else window.open(link,'_blank'); setTimeout(()=>loadUserStatus(),2000); }
        
        async function loadKeyContent(keyId){
            const webApp=window.Telegram?.WebApp;
            if(!webApp?.initData) return null;
            const resp=await fetch(`${WORKER_URL}/get-content?initData=${encodeURIComponent(webApp.initData)}&key=${keyId}`);
            if(resp.status===403){ await loadUserStatus(); throw new Error("ACCESS_DENIED"); }
            if(resp.ok) return await resp.json();
            return null;
        }
        
        function renderStepWithFullscreen(step, nextCallback, backCallback, homeCallback, startCallback){
            const isAudioStep = (step.type==='audio' || step.type==='audio_with_text' || step.type==='audio_with_image');
            const wrapperDiv = document.createElement('div');
            if(isAudioStep){
                wrapperDiv.className = 'fullscreen-audio-card';
                wrapperDiv.style.animation = 'fadeInUp 0.4s ease';
            } else wrapperDiv.className = '';
            const cardDiv = document.createElement('div');
            cardDiv.className = 'meditation-card';
            let innerHtml='';
            if(step.type==='welcome' || step.type==='text') innerHtml=`<div class="med-title">📘 Информация</div><div class="med-sub">${(step.content||step.text||'').replace(/\n/g,'<br>')}</div><button id="stepNextBtn" class="btn-audio">Далее</button>`;
            else if(isAudioStep){
                innerHtml=`<div class="med-title">${step.title||'🎧 Аудио'}</div><div class="med-sub">${(step.text||'').replace(/\n/g,'<br>')}</div>`;
                if(step.type==='audio_with_image') innerHtml+=`<div class="image-container"><img src="${step.image}" alt="illustration"></div>`;
                innerHtml+=`<div id="playerContainer"></div><button id="stepNextBtn" class="btn-audio">${step.btnText||'Далее'}</button>`;
            } else if(step.type==='images_with_text'){
                innerHtml=`<div class="med-title">🖼️ Картинки</div><div class="med-sub">${step.text.replace(/\n/g,'<br>')}</div><button id="showImagesBtn" class="btn-audio btn-secondary">${step.btnText||'Показать картинки'}</button><div id="hiddenImages" style="display:none;">${step.images.map(src=>`<div class="image-container"><img src="${src}"></div>`).join('')}</div><button id="stepNextBtn" class="btn-audio" style="margin-top:20px;">Далее →</button>`;
            } else if(step.type==='quiz'){
                innerHtml=`<div class="med-title">📝 Осмысление</div><div class="med-sub">${step.text.replace(/\n/g,'<br>')}</div>${step.questions.map((q,i)=>`<div class="quiz-question">${i+1}. ${q}</div>`).join('')}<button id="stepNextBtn" class="btn-audio">${step.btnText||'Далее'}</button>`;
            } else if(step.type==='next_key_prompt'){
                const nextKey=step.nextKey, purchased=userStatus[nextKey];
                if(purchased) innerHtml=`<div class="med-title">🔓 Переход к следующему ключу</div><div class="med-sub">Вы прошли этот ключ!</div><button id="nextKeyBtn" class="btn-audio">Перейти к ${nextKey==='key3'?'КЛЮЧУ 3':'КЛЮЧУ 4'}</button>`;
                else innerHtml=`<div class="med-title">🔒 Следующий ключ</div><div class="med-sub">Откройте ${nextKey==='key3'?'КЛЮЧ 3':'КЛЮЧ 4'} за ${nextKey==='key3'?1390:1890} ₽</div><button id="buyNextKeyBtn" class="btn-audio">💳 Купить</button>`;
                innerHtml+=`<button id="homeAfterKeyBtn" class="back-home">← На главную</button>`;
            } else if(step.type==='bonus_pdf') innerHtml=`<div class="med-title">📘 Бонусный материал</div><div class="med-sub">${step.text.replace(/\n/g,'<br>')}</div><a href="${step.pdf}" target="_blank" class="btn-audio" style="display:inline-block;">${step.btnText}</a><button id="stepNextBtn" class="btn-audio">Далее</button>`;
            else if(step.type==='final_bonus') innerHtml=`<div class="med-title">🎁 Завершение</div><div class="med-sub">${step.content.replace(/\n/g,'<br>')}</div><button id="stepNextBtn" class="btn-audio">${step.btnText||'Завершить'}</button>`;
            innerHtml+=`<div style="display:flex; justify-content:space-between; margin-top:20px;"><button id="stepBackBtn" class="back-home">← Назад</button><button id="stepStartBtn" class="back-to-start">🏁 В начало</button><button id="stepHomeBtn" class="back-home">🏠 На главную</button></div>`;
            cardDiv.innerHTML=innerHtml;
            wrapperDiv.appendChild(cardDiv);
            const panel=document.getElementById('dynamicPanel'); panel.innerHTML=''; panel.appendChild(wrapperDiv);
            if(isAudioStep && step.audio){
                const container=document.getElementById('playerContainer');
                if(container){
                    const audio=new Audio(step.audio);
                    audio.preload='metadata';
                    const playerDiv=document.createElement('div'); playerDiv.className='custom-player';
                    playerDiv.innerHTML=`<div class="player-controls"><button class="play-btn">▶</button><span class="time">0:00 / 0:00</span><input type="range" class="seek-bar" value="0" step="0.01"><select class="speed-select"><option value="0.5">0.5x</option><option value="0.75">0.75x</option><option value="1" selected>1x</option><option value="1.25">1.25x</option><option value="1.5">1.5x</option><option value="2">2x</option></select></div>`;
                    container.appendChild(playerDiv);
                    const playBtn=playerDiv.querySelector('.play-btn'), timeSpan=playerDiv.querySelector('.time'), seekBar=playerDiv.querySelector('.seek-bar'), speedSelect=playerDiv.querySelector('.speed-select');
                    let playing=false;
                    audio.addEventListener('loadedmetadata',()=>{ if(isFinite(audio.duration)){ seekBar.max=audio.duration; timeSpan.innerText=`0:00 / ${formatTime(audio.duration)}`; } });
                    audio.addEventListener('timeupdate',()=>{ if(!isNaN(audio.duration)){ seekBar.value=audio.currentTime; timeSpan.innerText=`${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`; } });
                    audio.addEventListener('ended',()=>{ playing=false; playBtn.innerText='▶'; });
                    playBtn.addEventListener('click',()=>{ if(playing){ audio.pause(); playBtn.innerText='▶'; playing=false; } else { audio.play().catch(e=>{}); playBtn.innerText='⏸'; playing=true; } });
                    seekBar.addEventListener('input',()=>{ audio.currentTime=parseFloat(seekBar.value); });
                    speedSelect.addEventListener('change',()=>{ audio.playbackRate=parseFloat(speedSelect.value); });
                    activeAudio=audio;
                }
            }
            function formatTime(sec){ if(isNaN(sec)) return "0:00"; const m=Math.floor(sec/60), s=Math.floor(sec%60); return `${m}:${s<10?'0'+s:s}`; }
            document.getElementById('stepNextBtn')?.addEventListener('click',()=>{ stopActiveAudio(); nextCallback(); });
            document.getElementById('stepBackBtn')?.addEventListener('click',()=>{ stopActiveAudio(); backCallback(); });
            document.getElementById('stepStartBtn')?.addEventListener('click',()=>{ stopActiveAudio(); startCallback(); });
            document.getElementById('stepHomeBtn')?.addEventListener('click',()=>{ stopActiveAudio(); homeCallback(); });
            if(step.type==='next_key_prompt'){
                if(userStatus[step.nextKey]) document.getElementById('nextKeyBtn')?.addEventListener('click',()=>openKeyContent(step.nextKey));
                else document.getElementById('buyNextKeyBtn')?.addEventListener('click',()=>openTributePayment(TRIBUTE_LINKS[step.nextKey], step.nextKey));
                document.getElementById('homeAfterKeyBtn')?.addEventListener('click',()=>goHome());
            }
            if(step.type==='images_with_text'){
                const showBtn=document.getElementById('showImagesBtn'), hiddenDiv=document.getElementById('hiddenImages');
                showBtn?.addEventListener('click',()=>{ if(hiddenDiv.style.display==='none'){ hiddenDiv.style.display='block'; showBtn.textContent='Скрыть картинки'; } else { hiddenDiv.style.display='none'; showBtn.textContent=step.btnText||'Показать картинки'; } });
            }
        }
        
        async function openKeyContent(keyId){
            if(!userStatus[keyId]){ showErrorAndGoHome(`Доступ к ключу не оплачен.`); return; }
            const panel=document.getElementById('dynamicPanel');
            panel.innerHTML=`<div class="meditation-card"><div class="loading-spinner"></div> Загрузка...</div>`;
            panel.classList.remove('hidden'); document.getElementById('homeScreen').classList.add('hidden');
            try{
                const content=await loadKeyContent(keyId);
                if(!content?.steps) throw new Error();
                currentContent=content; currentStepIndex=0; stepHistory=[];
                if(content.steps[0]?.type==='welcome' && welcomeShown[keyId]) currentStepIndex=1;
                renderCurrentStep();
            } catch(e){ showErrorAndGoHome("Ошибка загрузки контента."); await loadUserStatus(); }
        }
        function renderCurrentStep(){
            if(!currentContent || currentStepIndex>=currentContent.steps.length){
                if(currentContent?.key_id==='key2'){ completed.key2=true; localStorage.setItem('completed',JSON.stringify(completed)); }
                if(currentContent?.key_id==='key3'){ completed.key3=true; localStorage.setItem('completed',JSON.stringify(completed)); }
                goHome(); return;
            }
            const step=currentContent.steps[currentStepIndex];
            renderStepWithFullscreen(step, ()=>{ if(currentStepIndex===0 && currentContent.steps[0]?.type==='welcome') welcomeShown[currentContent.key_id]=true; stepHistory.push(currentStepIndex); currentStepIndex++; renderCurrentStep(); },
                ()=>{ if(stepHistory.length) currentStepIndex=stepHistory.pop(); else if(currentStepIndex>0) currentStepIndex--; renderCurrentStep(); },
                ()=>{ goHome(); }, ()=>{ currentStepIndex=0; stepHistory=[]; renderCurrentStep(); });
        }
        function goHome(){ stopActiveAudio(); document.getElementById('dynamicPanel').classList.add('hidden'); document.getElementById('homeScreen').classList.remove('hidden'); currentContent=null; loadUserStatus(); }
        function showErrorAndGoHome(msg){ stopActiveAudio(); const panel=document.getElementById('dynamicPanel'); panel.innerHTML=`<div class="meditation-card error-message">⚠️ ${msg}<br><button id="errorHomeBtn" class="btn-audio">Вернуться</button></div>`; panel.classList.remove('hidden'); document.getElementById('homeScreen').classList.add('hidden'); document.getElementById('errorHomeBtn')?.addEventListener('click',()=>goHome()); }
        
        // БЕСПЛАТНЫЙ КЛЮЧ 1 (полноэкранные плееры)
        const freeSteps=[
            { type: "welcome" },
            { type: "audio", title: "🎧 Настройка", text: "Слушайте перед медитацией.", audio: AUDIO_URLS.setup, btnText: "ДАЛЕЕ" },
            { type: "audio", title: "🔑 КЛЮЧ 1 · 5 врат", text: "Закройте глаза, дышите свободно.", audio: AUDIO_URLS.key1, btnText: "ДАЛЕЕ → интеграция" },
            { type: "audio", title: "🧩 Интеграция", text: "Закрепите состояние.", audio: AUDIO_URLS.integration, btnText: "ДАЛЕЕ" },
            { type: "steps" }
        ];
        function renderFreeStep(){
            if(freeStepIndex>=freeSteps.length){ goHome(); return; }
            const step=freeSteps[freeStepIndex];
            if(step.type==='welcome'){
                document.getElementById('dynamicPanel').innerHTML=`<div class="meditation-card"><div class="med-title">👋 Здравствуйте. Меня зовут Михаил</div><div class="med-sub">Что получите:<br>🎧 3 мин — настройка<br>🎧 10 мин — Ключ №1<br>🎧 7 мин — интеграция<br>🎁 бонус-подкаст</div><button id="welcomeBtn" class="btn-audio">ДА</button><button id="homeWelcomeBtn" class="back-home">← на главную</button></div>`;
                document.getElementById('welcomeBtn')?.addEventListener('click',()=>{ freeHistory.push(freeStepIndex); freeStepIndex++; renderFreeStep(); });
                document.getElementById('homeWelcomeBtn')?.addEventListener('click',()=>goHome());
                document.getElementById('homeScreen').classList.add('hidden'); document.getElementById('dynamicPanel').classList.remove('hidden'); return;
            } else if(step.type==='audio'){
                const wrapper=document.createElement('div'); wrapper.className='fullscreen-audio-card';
                const card=document.createElement('div'); card.className='meditation-card';
                card.innerHTML=`<div class="med-title">${step.title}</div><div class="med-sub">${step.text}</div><div id="freePlayer"></div><button id="freeNext" class="btn-audio">${step.btnText}</button><div><button id="freeBack" class="back-home">← Назад</button><button id="freeHome" class="back-home">На главную</button></div>`;
                wrapper.appendChild(card);
                document.getElementById('dynamicPanel').innerHTML=''; document.getElementById('dynamicPanel').appendChild(wrapper);
                const container=document.getElementById('freePlayer');
                const audio=new Audio(step.audio);
                audio.preload='metadata';
                const playerDiv=document.createElement('div'); playerDiv.className='custom-player';
                playerDiv.innerHTML=`<div class="player-controls"><button class="play-btn">▶</button><span class="time">0:00 / 0:00</span><input type="range" class="seek-bar" value="0"><select class="speed-select"><option value="0.5">0.5x</option><option value="0.75">0.75x</option><option value="1" selected>1x</option><option value="1.25">1.25x</option><option value="1.5">1.5x</option><option value="2">2x</option></select></div>`;
                container.appendChild(playerDiv);
                const playBtn=playerDiv.querySelector('.play-btn'), timeSpan=playerDiv.querySelector('.time'), seekBar=playerDiv.querySelector('.seek-bar'), speedSelect=playerDiv.querySelector('.speed-select');
                let playing=false; audio.addEventListener('loadedmetadata',()=>{ if(isFinite(audio.duration)){ seekBar.max=audio.duration; timeSpan.innerText=`0:00 / ${formatTime(audio.duration)}`; } });
                audio.addEventListener('timeupdate',()=>{ if(!isNaN(audio.duration)){ seekBar.value=audio.currentTime; timeSpan.innerText=`${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`; } });
                audio.addEventListener('ended',()=>{ playing=false; playBtn.innerText='▶'; });
                playBtn.addEventListener('click',()=>{ if(playing){ audio.pause(); playBtn.innerText='▶'; playing=false; } else { audio.play(); playBtn.innerText='⏸'; playing=true; } });
                seekBar.addEventListener('input',()=>{ audio.currentTime=parseFloat(seekBar.value); });
                speedSelect.addEventListener('change',()=>{ audio.playbackRate=parseFloat(speedSelect.value); });
                freeAudio=audio; function formatTime(sec){ if(isNaN(sec)) return "0:00"; const m=Math.floor(sec/60), s=Math.floor(sec%60); return `${m}:${s<10?'0'+s:s}`; }
                document.getElementById('freeNext')?.addEventListener('click',()=>{ if(freeAudio) freeAudio.pause(); freeHistory.push(freeStepIndex); freeStepIndex++; renderFreeStep(); });
                document.getElementById('freeBack')?.addEventListener('click',()=>{ if(freeAudio) freeAudio.pause(); if(freeHistory.length) freeStepIndex=freeHistory.pop(); else if(freeStepIndex>0) freeStepIndex--; renderFreeStep(); });
                document.getElementById('freeHome')?.addEventListener('click',()=>goHome());
                return;
            } else if(step.type==='steps'){
                document.getElementById('dynamicPanel').innerHTML=`<div class="meditation-card"><div class="med-title">📝 Три шага к почти волшебству</div><div class="med-sub">1. Запишите ощущение.<br>2. Спросите: «Что могу сделать, чтобы продлить состояние?»<br>3. Бонус: подкаст.</div><button id="bonusBtn" class="btn-audio btn-secondary">🎁 Забрать бонус-подкаст</button><button id="finishFree" class="btn-audio">→ Завершить</button><div><button id="freeBackStep" class="back-home">← Назад</button><button id="freeHomeStep" class="back-home">На главную</button></div></div>`;
                document.getElementById('bonusBtn')?.addEventListener('click',()=>{ alert('Бонус-подкаст доступен в плеере'); });
                document.getElementById('finishFree')?.addEventListener('click',()=>goHome());
                document.getElementById('freeBackStep')?.addEventListener('click',()=>{ if(freeHistory.length) freeStepIndex=freeHistory.pop(); else if(freeStepIndex>0) freeStepIndex--; renderFreeStep(); });
                document.getElementById('freeHomeStep')?.addEventListener('click',()=>goHome());
                document.getElementById('homeScreen').classList.add('hidden'); document.getElementById('dynamicPanel').classList.remove('hidden'); return;
            }
        }
        function startFreeKey(){ freeStepIndex=0; freeHistory=[]; renderFreeStep(); }
        
        document.querySelectorAll('.key-card').forEach(card=>{ card.addEventListener('click',(e)=>{ const key=card.dataset.key; if(key==='key1') startFreeKey(); else onKeyClick(key); }); });
        async function onKeyClick(keyId){ await loadUserStatus(); if(userStatus[keyId]) openKeyContent(keyId); else{ const prices={key2:'890 ₽',key3:'1390 ₽',key4:'1890 ₽'}; if(confirm(`${keyId.toUpperCase()} — ${prices[keyId]}\nОплатить через Tribute?`)) openTributePayment(TRIBUTE_LINKS[keyId],keyId); } }
        document.getElementById('buyAllBtn')?.addEventListener('click',()=>openTributePayment(TRIBUTE_LINKS.all,'all'));
        document.getElementById('donateBtn')?.addEventListener('click',()=>openTributePayment(TRIBUTE_LINKS.donate,null));
        if(window.Telegram?.WebApp){ window.Telegram.WebApp.ready(); window.Telegram.WebApp.expand(); }
        loadUserStatus(); setInterval(loadUserStatus, 15000);
        window.addEventListener('focus',()=>loadUserStatus());
        goHome();
    </script>
</body>
</html>
