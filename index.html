<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Точка опоры</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        .lang-switcher {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 100;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 6px 12px;
            display: flex;
            gap: 8px;
            border: 1px solid rgba(212,175,55,0.5);
        }
        .lang-btn {
            background: transparent;
            border: none;
            color: #FFE9B6;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 30px;
            transition: 0.2s;
        }
        .lang-btn.active {
            background: #D4AF37;
            color: #1a1408;
        }
        .lang-btn:hover {
            background: rgba(212,175,55,0.3);
        }
        .price-small {
            font-size: 11px;
            margin-top: 4px;
            color: #D4AF37;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="app-wrapper">
        <div class="app-container" id="mainAppContainer">
            <div id="homeScreen">
                <div class="lang-switcher">
                    <button class="lang-btn" data-lang="ru">🇷🇺 RU</button>
                    <button class="lang-btn" data-lang="en">🇬🇧 EN</button>
                </div>
                <div class="header">
                    <div class="brand">Точка опоры</div>
                    <div class="tagline" id="tagline">«Не волшебная таблетка, но близко»</div>
                </div>
                <button id="buyAllBtn" class="btn-buy-all">🎁 <span id="buyAllText">Купить все ключи (2+3+4)</span> — <span id="allPriceSpan"></span></button>
                <div class="grid-2x2">
                    <div class="key-card" data-key="key1">
                        <div class="key-number" id="key1Title">КЛЮЧ 1</div>
                        <div class="key-name" id="key1Name">5 врат</div>
                        <div class="price-small" id="key1Price">Бесплатно</div>
                        <div class="status-badge status-open">✓ открыт доступ</div>
                    </div>
                    <div class="key-card" data-key="key2">
                        <div class="key-number" id="key2Title">КЛЮЧ 2</div>
                        <div class="key-name" id="key2Name">Золотое сияние</div>
                        <div class="price-small" id="key2Price"></div>
                        <div class="status-badge" id="key2Status">🔒 закрыт доступ</div>
                    </div>
                    <div class="key-card" data-key="key3">
                        <div class="key-number" id="key3Title">КЛЮЧ 3</div>
                        <div class="key-name" id="key3Name">Искусство быть</div>
                        <div class="price-small" id="key3Price"></div>
                        <div class="status-badge" id="key3Status">🔒 закрыт доступ</div>
                    </div>
                    <div class="key-card" data-key="key4">
                        <div class="key-number" id="key4Title">КЛЮЧ 4</div>
                        <div class="key-name" id="key4Name">Субстрат жизненности</div>
                        <div class="price-small" id="key4Price"></div>
                        <div class="status-badge" id="key4Status">🔒 закрыт доступ</div>
                    </div>
                </div>
                <button id="donateBtn" class="btn-donate">👋 Передать привет автору</button>
                <div class="note" id="note">нажмите на ключ, чтобы начать практику</div>
            </div>
            <div id="dynamicPanel" class="hidden"></div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
