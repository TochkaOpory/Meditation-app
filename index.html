<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Точка опоры | Не волшебная таблетка, но близко</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a1612;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            color: #fff;
            padding: 20px 16px 40px;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo-icon {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .app-title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #d4af37 0%, #f5e79a 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .app-subtitle {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
        }

        /* 3D сфера прогресса */
        .progress-3d {
            background: #0f1f1a;
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .progress-label {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 12px;
        }

        .progress-percent {
            font-size: 32px;
            font-weight: 700;
            color: #d4af37;
            margin-top: 8px;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .card {
            background: #0f1f1a;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(212, 175, 55, 0.15);
        }

        .step-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #d4af37;
        }

        .step-description {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 16px;
            line-height: 1.4;
        }

        .btn {
            background: #d4af37;
            border: none;
            color: #0a1612;
            font-weight: 600;
            padding: 12px 0;
            width: 100%;
            border-radius: 40px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
            text-align: center;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(212, 175, 55, 0.5);
            color: #d4af37;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin: 15px 0 10px;
        }

        .btn-group .btn {
            flex: 1;
            margin-bottom: 0;
        }

        .player-section {
            background: #0b1a15;
            border-radius: 28px;
            padding: 16px;
            margin: 20px 0;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .now-title {
            font-size: 16px;
            font-weight: 600;
            color: #d4af37;
            text-align: center;
            margin-bottom: 10px;
        }

        .speed-control {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 12px 0 8px;
            flex-wrap: wrap;
        }

        .speed-btn {
            background: #1e2e28;
            border: none;
            color: #fff;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
        }

        .speed-btn.active {
            background: #d4af37;
            color: #0a1612;
        }

        audio {
            width: 100%;
            margin: 10px 0;
            border-radius: 40px;
        }

        .hidden {
            display: none;
        }

        .tracker-popup {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(212,175,55,0.2);
        }

        .tracker-days {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 12px 0;
            justify-content: center;
        }

        .day-circle {
            width: 38px;
            height: 38px;
            background: #1e2e28;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
        }

        .day-circle.completed {
            background: #d4af37;
            color: #0a1612;
        }

        .offer-card {
            background: linear-gradient(135deg, #14261f 0%, #0a1612 100%);
            border: 1px solid #d4af37;
        }

        .price {
            font-size: 22px;
            font-weight: 700;
            color: #d4af37;
        }

        .old-price {
            font-size: 14px;
            text-decoration: line-through;
            color: rgba(255,255,255,0.4);
            margin-left: 8px;
        }

        hr {
            margin: 16px 0;
            border: 0.5px solid rgba(212,175,55,0.15);
        }

        .note {
            font-size: 11px;
            color: rgba(255,255,255,0.35);
            text-align: center;
            margin-top: 16px;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>
<div class="container" id="app">
    <div class="header">
        <div class="logo-icon">🧘</div>
        <div class="app-title">Точка опоры</div>
        <div class="app-subtitle">«Не волшебная таблетка, но близко»</div>
    </div>

    <!-- 3D Прогресс -->
    <div class="progress-3d">
        <div class="progress-label">📊 Ваш прогресс</div>
        <canvas id="progressCanvas" width="140" height="140" style="width:140px;height:140px"></canvas>
        <div class="progress-percent" id="progressPercentDisplay">0%</div>
        <button id="showTrackerBtn" class="btn-secondary" style="margin-top:12px; padding:8px; font-size:13px;">📅 Показать календарь практики</button>
        <div id="trackerContainer" class="tracker-popup hidden"></div>
    </div>

    <div id="stepContainer"></div>

    <div class="player-section" id="playerSection">
        <div class="now-title" id="nowTitle">Не выбрано</div>
        <audio id="audioPlayer" controls preload="metadata">
            <source id="audioSource" src="" type="audio/mpeg">
        </audio>
        <div class="speed-control" id="speedControl">
            <button class="speed-btn" data-speed="0.75">0.75x</button>
            <button class="speed-btn active" data-speed="1">1x</button>
            <button class="speed-btn" data-speed="1.25">1.25x</button>
            <button class="speed-btn" data-speed="1.5">1.5x</button>
            <button class="speed-btn" data-speed="2">2x</button>
        </div>
    </div>

    <div class="note">Точка опоры — практики для устойчивости в быту, душе и социуме</div>
</div>

<script type="module">
    import * as THREE from 'three';

    // === ДАННЫЕ ===
    const STORAGE_KEY = "meditation_progress";
    const TRACKER_KEY = "meditation_tracker";

    const STEPS = [
        { id: "welcome", type: "welcome" },
        { id: "setup", type: "audio", title: "🎧 Настройка (3 минуты)", desc: "Слушайте перед медитацией.", audioUrl: "https://cloud.mail.ru/public/g4fW/acm1UUMAd", nextText: "ДАЛЕЕ" },
        { id: "key1", type: "audio", title: "🔑 Ключ №1 (10 минут)", desc: "Наденьте наушники. Закройте глаза. Дышите свободно.", audioUrl: "https://cloud.mail.ru/public/7JWi/aAPoShVXp", nextText: "ДАЛЕЕ → интеграция" },
        { id: "integration", type: "audio", title: "🧩 Интеграция (7 минут)", desc: "Закрепите состояние.", audioUrl: "https://cloud.mail.ru/public/ktir/dkuVVtU4B", nextText: "ДАЛЕЕ" },
        { id: "three_steps", type: "steps", nextText: "КЛЮЧИ" },
        { id: "offer", type: "offer" }
    ];

    const OFFER_TEXT = {
        keys: [
            { name: "✨ Ключ 2. «Золотое сияние» (25 мин)", price: "890 ₽", desc: "Возвращает лёгкость в бытовые дела." },
            { name: "🧘 Ключ 3. «Искусство быть» (30 мин)", price: "1390 ₽", desc: "Восстанавливает контакт с собой." },
            { name: "🌱 Ключ 4. «Субстрат жизненности» (28 мин)", price: "1890 ₽", desc: "Убирает социальное напряжение." }
        ],
        bundle: { name: "Все три ключа (2+3+4)", price: "2990 ₽", oldPrice: "4170 ₽", desc: "Экономия 1480 ₽" }
    };

    let currentStepIndex = 0;

    // === 3D СФЕРА ===
    let scene, camera, renderer, sphere, progressMaterial;
    let targetProgress = 0;
    let currentProgress = 0;

    function init3DProgress() {
        const canvas = document.getElementById('progressCanvas');
        const width = 140, height = 140;
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f1f1a);
        camera = new THREE.PerspectiveCamera(45, width/height, 0.1, 1000);
        camera.position.set(0, 0, 2.2);
        renderer = new THREE.WebGLRenderer({ canvas, alpha: false });
        renderer.setSize(width, height);
        renderer.setClearColor(0x0f1f1a);
        
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(1, 2, 1);
        scene.add(directionalLight);
        const backLight = new THREE.PointLight(0x443311, 0.5);
        backLight.position.set(0, 0, -1);
        scene.add(backLight);
        
        const geometry = new THREE.SphereGeometry(0.8, 64, 64);
        progressMaterial = new THREE.MeshStandardMaterial({
            color: 0xd4af37,
            emissive: 0x442200,
            roughness: 0.3,
            metalness: 0.7
        });
        sphere = new THREE.Mesh(geometry, progressMaterial);
        scene.add(sphere);
        
        function animate() {
            requestAnimationFrame(animate);
            if (currentProgress < targetProgress) {
                currentProgress += 0.008;
                if (currentProgress > targetProgress) currentProgress = targetProgress;
                updateSphereProgress(currentProgress);
            }
            sphere.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();
    }
    
    function updateSphereProgress(progress01) {
        if (!progressMaterial) return;
        const hue = 0.12 - (progress01 * 0.08);
        const saturation = 0.8;
        const lightness = 0.5 + progress01 * 0.3;
        progressMaterial.color.setHSL(hue, saturation, lightness);
        progressMaterial.emissiveIntensity = 0.3 + progress01 * 0.5;
    }
    
    function setProgressPercentUI(percent) {
        document.getElementById('progressPercentDisplay').innerText = `${percent}%`;
        targetProgress = percent / 100;
    }

    // === ПРОГРЕСС ===
    function getProgress() {
        const defaultProgress = { completed: [] };
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return defaultProgress;
        try { return JSON.parse(saved); } catch(e) { return defaultProgress; }
    }
    function saveProgress(progress) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
        updateProgressUI();
    }
    function updateProgressUI() {
        const total = STEPS.filter(s => s.type === "audio").length;
        const completed = getProgress().completed.length;
        const percent = total ? Math.round((completed / total) * 100) : 0;
        setProgressPercentUI(percent);
    }
    function markAudioCompleted(stepId) {
        const progress = getProgress();
        if (!progress.completed.includes(stepId)) {
            progress.completed.push(stepId);
            saveProgress(progress);
        }
    }

    // === КАЛЕНДАРЬ ===
    function renderTracker() {
        const tracker = JSON.parse(localStorage.getItem(TRACKER_KEY) || '{"dates":[]}');
        const today = new Date().toISOString().split('T')[0];
        const container = document.getElementById("trackerContainer");
        if (!container) return;
        let daysHtml = '<div class="tracker-days">';
        for (let i = 13; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            const ds = d.toISOString().split('T')[0];
            const completed = tracker.dates.includes(ds);
            daysHtml += `<div class="day-circle ${completed ? 'completed' : ''}" data-date="${ds}">${d.getDate()}</div>`;
        }
        daysHtml += '</div><div class="note">✔ Отметьте сегодняшний день после практики</div>';
        container.innerHTML = daysHtml;
        document.querySelectorAll("#trackerContainer .day-circle").forEach(el => {
            el.addEventListener("click", () => {
                const date = el.dataset.date;
                const todayStr = new Date().toISOString().split('T')[0];
                if (date === todayStr) {
                    const trackerData = JSON.parse(localStorage.getItem(TRACKER_KEY) || '{"dates":[]}');
                    if (!trackerData.dates.includes(date)) {
                        trackerData.dates.push(date);
                        localStorage.setItem(TRACKER_KEY, JSON.stringify(trackerData));
                        renderTracker();
                    }
                }
            });
        });
    }
    
    document.getElementById("showTrackerBtn")?.addEventListener("click", () => {
        const container = document.getElementById("trackerContainer");
        if (container.classList.contains("hidden")) {
            renderTracker();
            container.classList.remove("hidden");
        } else {
            container.classList.add("hidden");
        }
    });

    // === ПЛЕЕР ===
    function playAudio(url, title) {
        const audio = document.getElementById("audioPlayer");
        const source = document.getElementById("audioSource");
        document.getElementById("nowTitle").innerText = title;
        if (!audio || !source) return;
        source.src = url;
        audio.load();
        audio.play().catch(e => console.log("автоплей заблокирован"));
    }
    function initSpeedControl() {
        const audio = document.getElementById("audioPlayer");
        document.querySelectorAll(".speed-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                const speed = parseFloat(btn.dataset.speed);
                audio.playbackRate = speed;
                document.querySelectorAll(".speed-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
            });
        });
    }

    // === РЕНДЕР ШАГОВ ===
    function renderStep() {
        const step = STEPS[currentStepIndex];
        const container = document.getElementById("stepContainer");
        if (!container) return;
        if (step.type === "welcome") {
            container.innerHTML = `
                <div class="card">
                    <div class="step-title">👋 Здравствуйте. Меня зовут Михаил</div>
                    <div class="step-description">Я основатель школы Точка опоры. Вы выбрали название «Не волшебная таблетка, но близко» — значит, цените честность. Я не буду говорить, что вы всё бросите и улетите.</div>
                    <div class="step-description"><strong>Что получите:</strong><br>🎧 3 мин — настройка<br>🎧 10 мин — Ключ №1<br>🎧 7 мин — интеграция<br>🎁 Бонус — подкаст «5 врат»<br>📝 3 шага к почти волшебству</div>
                    <div class="btn" id="welcomeBtn">ДА</div>
                </div>
            `;
            document.getElementById("welcomeBtn")?.addEventListener("click", () => { currentStepIndex++; renderStep(); });
            return;
        }
        if (step.type === "audio") {
            container.innerHTML = `
                <div class="card">
                    <div class="step-title">${step.title}</div>
                    <div class="step-description">${step.desc}</div>
                    <div class="btn-group">
                        <div class="btn" id="playBtn">▶ Слушать</div>
                        <div class="btn btn-secondary" id="nextBtn">${step.nextText}</div>
                    </div>
                </div>
            `;
            document.getElementById("playBtn")?.addEventListener("click", () => {
                playAudio(step.audioUrl, step.title);
                markAudioCompleted(step.id);
            });
            document.getElementById("nextBtn")?.addEventListener("click", () => {
                if (currentStepIndex + 1 < STEPS.length) { currentStepIndex++; renderStep(); }
                else { renderStep(); }
            });
            return;
        }
        if (step.type === "steps") {
            container.innerHTML = `
                <div class="card">
                    <div class="step-title">📝 Три шага к почти волшебству</div>
                    <div class="step-description">1. Запишите одно ощущение, которое появилось во время или после практики.<br>2. Спросите: «Что я могу сделать прямо сейчас, чтобы продлить это состояние?» — и сделайте.<br>3. Ваш бонус: подкаст «5 врат медитации» — о том, какие уровни открывает регулярная практика.</div>
                    <div class="btn-group">
                        <div class="btn" id="bonusBtn">🎁 Забрать бонус</div>
                        <div class="btn btn-secondary" id="nextStepsBtn">${step.nextText}</div>
                    </div>
                </div>
            `;
            document.getElementById("bonusBtn")?.addEventListener("click", () => {
                playAudio("https://cloud.mail.ru/public/wUsp/HjvUEmGSD", "🎁 5 врат медитации");
            });
            document.getElementById("nextStepsBtn")?.addEventListener("click", () => { currentStepIndex++; renderStep(); });
            return;
        }
        if (step.type === "offer") {
            let html = `<div class="card offer-card"><div class="step-title">🔑 Остальные 3 ключа</div><div class="step-description">Вы уже получили Ключ №1 бесплатно. Теперь решать вам: идти глубже или нет.</div><div class="step-description"><strong>Вариант А. По одному:</strong></div>`;
            OFFER_TEXT.keys.forEach(k => { html += `<div class="step-description">• ${k.name} — ${k.price}<br>${k.desc}</div>`; });
            html += `<div class="step-description"><strong>Вариант Б. Все три ключа:</strong><br>💰 ${OFFER_TEXT.bundle.name} — ${OFFER_TEXT.bundle.price} <span class="old-price">${OFFER_TEXT.bundle.oldPrice}</span><br>${OFFER_TEXT.bundle.desc}</div>`;
            html += `<div class="step-description">Каждый ключ = аудиомедитация + текстовые шаги + картинки и аудиоподкасты.</div><div class="note">Платная версия временно отключена. Свяжитесь с @tochka_opory_bot для доступа.</div></div>`;
            container.innerHTML = html;
            return;
        }
    }

    // СТАРТ
    init3DProgress();
    initSpeedControl();
    renderStep();
    updateProgressUI();
    if (window.Telegram?.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    }
</script>
</body>
</html>
