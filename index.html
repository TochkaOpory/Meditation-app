<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Точка опоры | Медитации</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a1612;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            color: #fff;
            padding: 20px 16px 30px;
            min-height: 100vh;
        }

        /* главный контейнер */
        .app-container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* хидер */
        .header {
            text-align: center;
            margin-bottom: 32px;
            padding-top: 8px;
        }

        .logo-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .app-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #d4af37 0%, #f5e79a 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .app-subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            margin-top: 6px;
        }

        /* карточка */
        .card {
            background: #0f1f1a;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            transition: all 0.2s ease;
        }

        /* карточка активной медитации */
        .card-active {
            border: 1px solid #d4af37;
            background: #14261f;
            box-shadow: 0 0 0 1px rgba(212, 175, 55, 0.3);
        }

        .meditation-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .meditation-title {
            font-size: 20px;
            font-weight: 700;
        }

        .meditation-duration {
            font-size: 13px;
            background: rgba(212, 175, 55, 0.2);
            padding: 4px 10px;
            border-radius: 20px;
            color: #d4af37;
        }

        .meditation-desc {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 16px;
            line-height: 1.4;
        }

        /* кнопки */
        .btn-play {
            background: #d4af37;
            border: none;
            color: #0a1612;
            font-weight: 600;
            padding: 10px 0;
            width: 100%;
            border-radius: 40px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
        }

        .btn-play:hover {
            background: #f5d543;
            transform: scale(0.98);
        }

        .btn-next {
            background: transparent;
            border: 1px solid rgba(212, 175, 55, 0.5);
            color: #d4af37;
            padding: 8px 0;
            border-radius: 40px;
            font-size: 14px;
            cursor: pointer;
        }

        /* плеер */
        .player-section {
            background: #0b1a15;
            border-radius: 32px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .now-playing {
            text-align: center;
            margin-bottom: 20px;
        }

        .now-title {
            font-size: 18px;
            font-weight: 600;
            color: #d4af37;
        }

        .now-status {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
        }

        audio {
            width: 100%;
            margin: 10px 0;
        }

        audio::-webkit-media-controls-panel {
            background-color: #14261f;
        }

        /* трекер прогресса */
        .progress-section {
            margin: 24px 0 20px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.6);
        }

        .progress-bar-bg {
            background: #1e2e28;
            border-radius: 20px;
            height: 8px;
            overflow: hidden;
        }

        .progress-fill {
            background: #d4af37;
            width: 0%;
            height: 100%;
            border-radius: 20px;
            transition: width 0.3s;
        }

        /* бонус-трекер */
        .bonus-tracker {
            background: #0b1a15;
            border-radius: 20px;
            padding: 16px;
            margin-top: 16px;
        }

        .bonus-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .days-grid {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .day-circle {
            width: 44px;
            height: 44px;
            background: #1e2e28;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255,255,255,0.6);
            transition: all 0.2s;
        }

        .day-circle.completed {
            background: #d4af37;
            color: #0a1612;
        }

        .btn-reset {
            background: none;
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.5);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 12px;
            margin-top: 12px;
            width: 100%;
            cursor: pointer;
        }

        .note {
            font-size: 11px;
            color: rgba(255,255,255,0.35);
            text-align: center;
            margin-top: 24px;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="logo-icon">🧘</div>
        <div class="app-title">Точка опоры</div>
        <div class="app-subtitle">«Не волшебная таблетка, но близко»</div>
    </div>

    <!-- ПЛЕЕР -->
    <div class="player-section" id="playerSection">
        <div class="now-playing">
            <div class="now-title" id="nowPlayingTitle">5 врат</div>
            <div class="now-status" id="nowPlayingStatus">Нажмите ▶ чтобы начать</div>
        </div>
        <audio id="audioPlayer" controls preload="metadata">
            <source id="audioSource" src="" type="audio/mpeg">
            Ваш браузер не поддерживает аудио.
        </audio>
    </div>

    <!-- СПИСОК МЕДИТАЦИЙ (4 ключа) -->
    <div id="meditationList"></div>

    <!-- ПРОГРЕСС ПО ПРАКТИКЕ -->
    <div class="progress-section">
        <div class="progress-header">
            <span>📊 Прогресс практики</span>
            <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <!-- БОНУС-ТРЕКЕР: КАЛЕНДАРЬ МЕДИТАЦИЙ -->
    <div class="card">
        <div class="bonus-tracker">
            <div class="bonus-title">
                <span>📅</span> Календарь осознанности
            </div>
            <div class="days-grid" id="daysGrid"></div>
            <button class="btn-reset" id="resetTrackerBtn">Сбросить трекер</button>
            <div class="note" style="margin-top: 12px;">отмечайте день после прослушивания любой медитации</div>
        </div>
    </div>
    <div class="note">⚡ Точка опоры — система практик для устойчивости в быту, душе и социуме</div>
</div>

<script src="meditations.js"></script>
<script src="app.js"></script>
</body>
</html>
