<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Точка опоры | Не волшебная таблетка, но близко</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #FEF9EF;
            font-family: 'Inter', sans-serif;
            color: #2C2B28;
            padding: 24px 20px 60px;
        }
        .app-container {
            max-width: 600px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 600;
            background: linear-gradient(135deg, #C6A43B 0%, #E8D194 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .tagline {
            font-size: 14px;
            color: #A18C68;
            margin-top: 6px;
            font-style: italic;
        }
        .grid-2x2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 32px 0;
        }
        .key-card {
            background: rgba(255,251,240,0.9);
            backdrop-filter: blur(2px);
            border-radius: 32px;
            padding: 24px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s;
            border: 1px solid #F3E9D2;
        }
        .key-card:hover {
            transform: translateY(-4px);
            background: white;
            border-color: #EADCA8;
        }
        .key-number {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 700;
            color: #C6A43B;
            margin-bottom: 8px;
        }
        .key-name {
            font-size: 15px;
            font-weight: 500;
            color: #4A4232;
        }
        .meditation-card {
            background: white;
            border-radius: 48px;
            padding: 24px 20px;
            margin: 16px 0;
            border: 1px solid #F2E5CD;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            animation: fadeScale 0.25s;
        }
        @keyframes fadeScale {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }
        .med-title {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 600;
            color: #C6A43B;
            margin-bottom: 8px;
        }
        .med-sub {
            font-size: 14px;
            color: #8B7A5C;
            margin-bottom: 20px;
            padding-left: 12px;
            border-left: 2px solid #EADCA8;
        }
        audio {
            width: 100%;
            margin: 12px 0;
            border-radius: 40px;
        }
        .speed-control {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #F3EFE5;
            padding: 8px 16px;
            border-radius: 40px;
            margin: 16px 0 8px;
            flex-wrap: wrap;
        }
        .speed-label {
            font-weight: 500;
            color: #B29A64;
        }
        input[type="range"] {
            flex: 1;
            min-width: 120px;
            accent-color: #C6A43B;
        }
        .progress-text {
            font-size: 13px;
            color: #AD9A74;
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
        }
        .btn-audio {
            background: #C6A43B;
            border: none;
            color: white;
            font-weight: 600;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 16px;
            width: 100%;
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid #EADCA8;
            color: #C6A43B;
        }
        .back-home {
            background: none;
            border: none;
            color: #B29B65;
            font-size: 14px;
            margin-top: 20px;
            cursor: pointer;
        }
        .offer-card {
            background: #FEF7E6;
            border-radius: 40px;
            padding: 20px;
            margin-top: 20px;
        }
        .price {
            font-size: 24px;
            font-weight: 700;
            color: #C6A43B;
        }
        .old-price {
            text-decoration: line-through;
            color: #B59F71;
            margin-left: 10px;
            font-size: 16px;
        }
        .note {
            font-size: 11px;
            color: #BCAA86;
            text-align: center;
            margin-top: 20px;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="brand">Точка опоры</div>
        <div class="tagline">«Не волшебная таблетка, но близко»</div>
    </div>

    <div id="homeScreen">
        <div class="grid-2x2">
            <div class="key-card" data-key="key1"><div class="key-number">КЛЮЧ 1</div><div class="key-name">5 врат</div></div>
            <div class="key-card" data-key="key2"><div class="key-number">КЛЮЧ 2</div><div class="key-name">Золотое сияние</div></div>
            <div class="key-card" data-key="key3"><div class="key-number">КЛЮЧ 3</div><div class="key-name">Искусство быть</div></div>
            <div class="key-card" data-key="key4"><div class="key-number">КЛЮЧ 4</div><div class="key-name">Субстрат жизненности</div></div>
        </div>
        <div class="note">нажмите на ключ, чтобы начать</div>
    </div>

    <div id="dynamicPanel" class="hidden"></div>
</div>

<script>
    // ----- ПРЯМЫЕ ССЫЛКИ НА ФАЙЛЫ -----
    const AUDIO_URLS = {
        setup: "https://tochkaopory.github.io/Meditation-app/setup.mp3",
        key1: "https://tochkaopory.github.io/Meditation-app/key1.mp3",
        integration: "https://tochkaopory.github.io/Meditation-app/integration.mp3",
        bonus: "https://tochkaopory.github.io/Meditation-app/bonus.mp3"
    };

    const FREE_STEPS = [
        { type: "welcome" },
        { type: "audio", id: "setup", title: "🎧 Настройка (3 минуты)", desc: "Слушайте перед медитацией.", audioKey: "setup", nextText: "ДАЛЕЕ" },
        { type: "audio", id: "key1", title: "🔑 КЛЮЧ 1 · 5 врат (10 минут)", desc: "Наденьте наушники. Закройте глаза.", audioKey: "key1", nextText: "ДАЛЕЕ" },
        { type: "audio", id: "integration", title: "🧩 Интеграция (7 минут)", desc: "Закрепите состояние.", audioKey: "integration", nextText: "ДАЛЕЕ" },
        { type: "steps" }
    ];

    const OFFER = {
        keys: ["✨ Ключ 2. Золотое сияние — 890 ₽", "🧘 Ключ 3. Искусство быть — 1390 ₽", "🌱 Ключ 4. Субстрат жизненности — 1890 ₽"],
        bundle: "🎁 Все три ключа (2+3+4) — 2990 ₽ вместо 4170 ₽"
    };

    let currentStep = 0;
    let stepHistory = [];
    let currentSpeed = 1;

    const homeDiv = document.getElementById('homeScreen');
    const dynamicDiv = document.getElementById('dynamicPanel');

    function showHome() {
        dynamicDiv.classList.add('hidden');
        homeDiv.classList.remove('hidden');
        dynamicDiv.innerHTML = '';
    }

    function createAudioElement(url) {
        const audio = document.createElement('audio');
        audio.controls = true;
        audio.preload = 'metadata';
        audio.src = url;
        audio.style.width = '100%';
        return audio;
    }

    function renderStep() {
        const step = FREE_STEPS[currentStep];
        if (!step) {
            renderOffer();
            return;
        }

        if (step.type === 'welcome') {
            dynamicDiv.innerHTML = `
                <div class="meditation-card">
                    <div class="med-title">👋 Здравствуйте. Меня зовут Михаил</div>
                    <div class="med-sub">Основатель школы Точка опоры.<br><br>Что получите:<br>🎧 3 мин — настройка<br>🎧 10 мин — Ключ №1<br>🎧 7 мин — интеграция<br>🎁 бонус-подкаст<br>📝 3 шага к почти волшебству</div>
                    <button id="welcomeBtn" class="btn-audio">ДА</button>
                    <button id="homeBtn" class="back-home">← на главную</button>
                </div>
            `;
            document.getElementById('welcomeBtn')?.addEventListener('click', () => { stepHistory.push(currentStep); currentStep++; renderStep(); });
            document.getElementById('homeBtn')?.addEventListener('click', showHome);
            homeDiv.classList.add('hidden');
            dynamicDiv.classList.remove('hidden');
            return;
        }

        if (step.type === 'audio') {
            dynamicDiv.innerHTML = `
                <div class="meditation-card">
                    <div class="med-title">${step.title}</div>
                    <div class="med-sub">${step.desc}</div>
                    <div id="audioContainer"></div>
                    <div class="speed-control">
                        <span class="speed-label">скорость</span>
                        <input type="range" id="speedSlider" min="0.5" max="2" step="0.05" value="1">
                        <span id="speedVal">1.0x</span>
                    </div>
                    <button id="nextBtn" class="btn-audio">${step.nextText}</button>
                    <button id="backBtn" class="back-home">← Назад</button>
                    <button id="homeAudioBtn" class="back-home">На главную</button>
                </div>
            `;
            const audio = createAudioElement(AUDIO_URLS[step.audioKey]);
            document.getElementById('audioContainer').appendChild(audio);

            const slider = document.getElementById('speedSlider');
            const speedSpan = document.getElementById('speedVal');
            slider.addEventListener('input', () => {
                const val = parseFloat(slider.value);
                speedSpan.innerText = val.toFixed(2) + 'x';
                audio.playbackRate = val;
            });

            document.getElementById('nextBtn').addEventListener('click', () => {
                stepHistory.push(currentStep);
                currentStep++;
                renderStep();
            });
            document.getElementById('backBtn').addEventListener('click', () => {
                if (stepHistory.length) currentStep = stepHistory.pop();
                else if (currentStep > 0) currentStep--;
                renderStep();
            });
            document.getElementById('homeAudioBtn').addEventListener('click', showHome);
            homeDiv.classList.add('hidden');
            dynamicDiv.classList.remove('hidden');
            return;
        }

        if (step.type === 'steps') {
            dynamicDiv.innerHTML = `
                <div class="meditation-card">
                    <div class="med-title">📝 Три шага к почти волшебству</div>
                    <div class="med-sub">1. Запишите одно ощущение после практики.<br>2. Спросите: «Что могу сделать, чтобы продлить состояние?»<br>3. Сделайте это.</div>
                    <button id="bonusBtn" class="btn-audio btn-secondary">🎁 Забрать бонус-подкаст</button>
                    <button id="offerBtn" class="btn-audio">→ КЛЮЧИ</button>
                    <button id="backStepsBtn" class="back-home">← Назад</button>
                    <button id="homeStepsBtn" class="back-home">На главную</button>
                </div>
            `;
            document.getElementById('bonusBtn')?.addEventListener('click', () => {
                // ПРОСТО ВОСПРОИЗВОДИМ БОНУС-ПОДКАСТ
                const bonusCard = document.createElement('div');
                bonusCard.className = 'meditation-card';
                bonusCard.innerHTML = `<div class="med-title">🎁 Бонус: подкаст «5 врат»</div><div id="bonusPlayer"></div><button class="back-home" id="closeBonus">Закрыть</button>`;
                const bonusAudio = createAudioElement(AUDIO_URLS.bonus);
                bonusCard.querySelector('#bonusPlayer').appendChild(bonusAudio);
                document.getElementById('dynamicPanel').innerHTML = '';
                document.getElementById('dynamicPanel').appendChild(bonusCard);
                document.getElementById('closeBonus')?.addEventListener('click', () => renderStep());
            });
            document.getElementById('offerBtn')?.addEventListener('click', () => renderOffer());
            document.getElementById('backStepsBtn')?.addEventListener('click', () => {
                if (stepHistory.length) currentStep = stepHistory.pop();
                else if (currentStep > 0) currentStep--;
                renderStep();
            });
            document.getElementById('homeStepsBtn')?.addEventListener('click', showHome);
            homeDiv.classList.add('hidden');
            dynamicDiv.classList.remove('hidden');
        }
    }

    function renderOffer() {
        let html = `<div class="meditation-card offer-card"><div class="med-title">🔑 Остальные 3 ключа</div><div class="med-sub">`;
        OFFER.keys.forEach(k => html += `${k}<br>`);
        html += `${OFFER.bundle}<br><br>Каждый ключ = аудиомедитация + шаги + картинки</div>`;
        html += `<div class="note">Платная версия — через @tochka_opory_bot</div><button id="offerHome" class="back-home">← на главную</button></div>`;
        dynamicDiv.innerHTML = html;
        document.getElementById('offerHome')?.addEventListener('click', showHome);
        homeDiv.classList.add('hidden');
        dynamicDiv.classList.remove('hidden');
    }

    function openKey1() { currentStep = 0; stepHistory = []; renderStep(); }
    function openLocked(key) { dynamicDiv.innerHTML = `<div class="meditation-card"><div class="med-title">🔒 ${key}</div><div class="med-sub">Ключ не активирован. Доступ по ссылке.</div><button class="back-home" id="lockedHome">← на главную</button></div>`; document.getElementById('lockedHome')?.addEventListener('click', showHome); homeDiv.classList.add('hidden'); dynamicDiv.classList.remove('hidden'); }

    document.querySelectorAll('.key-card').forEach(card => {
        card.addEventListener('click', () => {
            const k = card.dataset.key;
            if (k === 'key1') openKey1();
            else if (k === 'key2') openLocked('КЛЮЧ 2 · Золотое сияние');
            else if (k === 'key3') openLocked('КЛЮЧ 3 · Искусство быть');
            else if (k === 'key4') openLocked('КЛЮЧ 4 · Субстрат жизненности');
        });
    });

    if (window.Telegram?.WebApp) { window.Telegram.WebApp.ready(); window.Telegram.WebApp.expand(); }
</script>
</body>
</html>
