<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Точка опоры | Не волшебная таблетка, но близко</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #FEF9EF; font-family: 'Inter', sans-serif; color: #2C2B28; padding: 24px 20px 60px; }
        .app-container { max-width: 500px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 32px; }
        .brand { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 600; background: linear-gradient(135deg, #C6A43B 0%, #E8D194 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .tagline { font-size: 14px; color: #A18C68; margin-top: 6px; font-style: italic; }
        .grid-2x2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 32px 0; }
        .key-card { background: rgba(255,251,240,0.9); border-radius: 32px; padding: 24px 12px; text-align: center; cursor: pointer; transition: 0.2s; border: 1px solid #F3E9D2; }
        .key-card:hover { transform: translateY(-4px); background: white; border-color: #EADCA8; }
        .key-number { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; color: #C6A43B; margin-bottom: 8px; }
        .key-name { font-size: 15px; font-weight: 500; color: #4A4232; }
        .meditation-card { background: white; border-radius: 48px; padding: 24px; margin: 16px 0; border: 1px solid #F2E5CD; box-shadow: 0 4px 20px rgba(0,0,0,0.02); animation: fade 0.25s; }
        @keyframes fade { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
        .med-title { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 600; color: #C6A43B; margin-bottom: 8px; }
        .med-sub { font-size: 14px; color: #8B7A5C; margin-bottom: 20px; padding-left: 12px; border-left: 2px solid #EADCA8; }
        
        /* КАСТОМНЫЙ ПЛЕЕР */
        .custom-player { background: #F3EFE5; border-radius: 60px; padding: 16px; margin: 16px 0; }
        .player-controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .play-btn { background: #C6A43B; border: none; color: white; width: 48px; height: 48px; border-radius: 50%; font-size: 20px; cursor: pointer; }
        .time { font-size: 14px; color: #B29A64; min-width: 100px; }
        .seek-bar { flex: 1; height: 6px; -webkit-appearance: none; background: #EADCA8; border-radius: 10px; outline: none; cursor: pointer; }
        .seek-bar::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: #C6A43B; border-radius: 50%; cursor: pointer; }
        .speed-select { background: white; border: 1px solid #EADCA8; border-radius: 30px; padding: 6px 12px; font-size: 14px; color: #C6A43B; cursor: pointer; }
        
        .btn-audio { background: #C6A43B; border: none; color: white; font-weight: 600; padding: 12px 24px; border-radius: 60px; font-size: 16px; cursor: pointer; margin-top: 16px; width: 100%; }
        .btn-secondary { background: transparent; border: 1px solid #EADCA8; color: #C6A43B; }
        .back-home { background: none; border: none; color: #B29B65; font-size: 14px; margin-top: 20px; cursor: pointer; display: block; margin-left: auto; margin-right: auto; }
        .offer-card { background: #FEF7E6; border-radius: 40px; padding: 20px; margin-top: 20px; }
        .price { font-size: 24px; font-weight: 700; color: #C6A43B; }
        .old-price { text-decoration: line-through; color: #B59F71; margin-left: 10px; font-size: 16px; }
        .note { font-size: 11px; color: #BCAA86; text-align: center; margin-top: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="brand">Точка опоры</div>
        <div class="tagline">«Не волшебная таблетка, но близко»</div>
    </div>
    <div id="homeScreen">
        <div class="grid-2x2">
            <div class="key-card" data-key="key1"><div class="key-number">КЛЮЧ 1</div><div class="key-name">5 врат</div></div>
            <div class="key-card" data-key="key2"><div class="key-number">КЛЮЧ 2</div><div class="key-name">Золотое сияние</div></div>
            <div class="key-card" data-key="key3"><div class="key-number">КЛЮЧ 3</div><div class="key-name">Искусство быть</div></div>
            <div class="key-card" data-key="key4"><div class="key-number">КЛЮЧ 4</div><div class="key-name">Субстрат жизненности</div></div>
        </div>
        <div class="note">нажмите на ключ, чтобы начать</div>
    </div>
    <div id="dynamicPanel" class="hidden"></div>
</div>

<script>
    // ----- ССЫЛКИ НА ВАШИ ФАЙЛЫ НА GITHUB (ОНИ ДОЛЖНЫ БЫТЬ В РЕПОЗИТОРИИ) -----
    const AUDIO_URLS = {
        setup: "https://tochkaopory.github.io/Meditation-app/setup.mp3",
        key1: "https://tochkaopory.github.io/Meditation-app/key1.mp3",
        integration: "https://tochkaopory.github.io/Meditation-app/integration.mp3",
        bonus: "https://tochkaopory.github.io/Meditation-app/bonus.mp3"
    };

    const FREE_STEPS = [
        { type: "welcome" },
        { type: "audio", id: "setup", title: "🎧 Настройка (3 минуты)", desc: "Слушайте перед медитацией.", audioKey: "setup", nextText: "ДАЛЕЕ" },
        { type: "audio", id: "key1", title: "🔑 КЛЮЧ 1 · 5 врат (10 минут)", desc: "Наденьте наушники. Закройте глаза.", audioKey: "key1", nextText: "ДАЛЕЕ" },
        { type: "audio", id: "integration", title: "🧩 Интеграция (7 минут)", desc: "Закрепите состояние.", audioKey: "integration", nextText: "ДАЛЕЕ" },
        { type: "steps" }
    ];

    const OFFER = {
        keys: ["✨ Ключ 2. Золотое сияние — 890 ₽", "🧘 Ключ 3. Искусство быть — 1390 ₽", "🌱 Ключ 4. Субстрат жизненности — 1890 ₽"],
        bundle: "🎁 Все три ключа (2+3+4) — 2990 ₽ вместо 4170 ₽"
    };

    let currentStep = 0;
    let stepHistory = [];
    let currentAudio = null;
    let currentAudioContext = null;

    const homeDiv = document.getElementById('homeScreen');
    const dynamicDiv = document.getElementById('dynamicPanel');

    function showHome() { 
        dynamicDiv.classList.add('hidden'); 
        homeDiv.classList.remove('hidden'); 
        dynamicDiv.innerHTML = ''; 
        if (currentAudio) { currentAudio.pause(); currentAudio = null; }
        if (currentAudioContext) { currentAudioContext.close(); currentAudioContext = null; }
    }

    // КАСТОМНЫЙ ПЛЕЕР С ПЕРЕМОТКОЙ И СКОРОСТЬЮ
    function initCustomPlayer(url, container, onEnded) {
        const audio = new Audio(url);
        audio.preload = 'metadata';
        
        const playerDiv = document.createElement('div');
        playerDiv.className = 'custom-player';
        playerDiv.innerHTML = `
            <div class="player-controls">
                <button class="play-btn">▶</button>
                <span class="time">0:00 / 0:00</span>
                <input type="range" class="seek-bar" value="0" step="0.01">
                <select class="speed-select">
                    <option value="0.75">0.75x</option>
                    <option value="1" selected>1x</option>
                    <option value="1.25">1.25x</option>
                    <option value="1.5">1.5x</option>
                    <option value="2">2x</option>
                </select>
            </div>
        `;
        container.appendChild(playerDiv);
        
        const playBtn = playerDiv.querySelector('.play-btn');
        const timeSpan = playerDiv.querySelector('.time');
        const seekBar = playerDiv.querySelector('.seek-bar');
        const speedSelect = playerDiv.querySelector('.speed-select');
        
        let isPlaying = false;
        
        audio.addEventListener('loadedmetadata', () => {
            seekBar.max = audio.duration;
            timeSpan.innerText = `0:00 / ${formatTime(audio.duration)}`;
        });
        
        audio.addEventListener('timeupdate', () => {
            if (!isNaN(audio.duration)) {
                seekBar.value = audio.currentTime;
                timeSpan.innerText = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
            }
        });
        
        audio.addEventListener('ended', () => {
            isPlaying = false;
            playBtn.innerText = '▶';
            if (onEnded) onEnded();
        });
        
        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                playBtn.innerText = '▶';
                isPlaying = false;
            } else {
                audio.play().catch(e => console.log('Play error:', e));
                playBtn.innerText = '⏸';
                isPlaying = true;
            }
        });
        
        seekBar.addEventListener('input', () => {
            audio.currentTime = parseFloat(seekBar.value);
        });
        
        speedSelect.addEventListener('change', () => {
            audio.playbackRate = parseFloat(speedSelect.value);
        });
        
        currentAudio = audio;
        return { audio, playerDiv };
    }
    
    function formatTime(sec) {
        const mins = Math.floor(sec / 60);
        const seconds = Math.floor(sec % 60);
        return `${mins}:${seconds < 10 ? '0' + seconds : seconds}`;
    }

    function renderStep() {
        const step = FREE_STEPS[currentStep];
        if (!step) { renderOffer(); return; }

        if (step.type === 'welcome') {
            dynamicDiv.innerHTML = `<div class="meditation-card"><div class="med-title">👋 Здравствуйте. Меня зовут Михаил</div><div class="med-sub">Основатель школы Точка опоры.<br><br>Что получите:<br>🎧 3 мин — настройка<br>🎧 10 мин — Ключ №1<br>🎧 7 мин — интеграция<br>🎁 бонус-подкаст<br>📝 3 шага к почти волшебству</div><button id="welcomeBtn" class="btn-audio">ДА</button><button id="homeBtn" class="back-home">← на главную</button></div>`;
            document.getElementById('welcomeBtn')?.addEventListener('click', () => { stepHistory.push(currentStep); currentStep++; renderStep(); });
            document.getElementById('homeBtn')?.addEventListener('click', showHome);
            homeDiv.classList.add('hidden'); dynamicDiv.classList.remove('hidden');
            return;
        }

        if (step.type === 'audio') {
            dynamicDiv.innerHTML = `<div class="meditation-card"><div class="med-title">${step.title}</div><div class="med-sub">${step.desc}</div><div id="playerContainer"></div><button id="nextBtn" class="btn-audio">${step.nextText}</button><button id="backBtn" class="back-home">← Назад</button><button id="homeAudioBtn" class="back-home">На главную</button></div>`;
            
            const playerContainer = document.getElementById('playerContainer');
            initCustomPlayer(AUDIO_URLS[step.audioKey], playerContainer, () => {});
            
            document.getElementById('nextBtn').addEventListener('click', () => { stepHistory.push(currentStep); currentStep++; renderStep(); });
            document.getElementById('backBtn').addEventListener('click', () => { if (stepHistory.length) currentStep = stepHistory.pop(); else if (currentStep > 0) currentStep--; renderStep(); });
            document.getElementById('homeAudioBtn').addEventListener('click', showHome);
            homeDiv.classList.add('hidden'); dynamicDiv.classList.remove('hidden');
            return;
        }

        if (step.type === 'steps') {
            dynamicDiv.innerHTML = `<div class="meditation-card"><div class="med-title">📝 Три шага к почти волшебству</div><div class="med-sub">1. Запишите ощущение после практики.<br>2. Спросите: «Что могу сделать, чтобы продлить состояние?»<br>3. Сделайте это.</div><button id="bonusBtn" class="btn-audio btn-secondary">🎁 Забрать бонус-подкаст</button><button id="offerBtn" class="btn-audio">→ КЛЮЧИ</button><button id="backStepsBtn" class="back-home">← Назад</button><button id="homeStepsBtn" class="back-home">На главную</button></div>`;
            
            document.getElementById('bonusBtn')?.addEventListener('click', () => {
                const bonusContainer = document.createElement('div');
                bonusContainer.className = 'meditation-card';
                bonusContainer.innerHTML = `<div class="med-title">🎁 Бонус: подкаст «5 врат»</div><div id="bonusPlayer"></div><button class="back-home" id="closeBonus">Закрыть</button>`;
                dynamicDiv.innerHTML = '';
                dynamicDiv.appendChild(bonusContainer);
                initCustomPlayer(AUDIO_URLS.bonus, document.getElementById('bonusPlayer'), () => {});
                document.getElementById('closeBonus')?.addEventListener('click', () => renderStep());
            });
            
            document.getElementById('offerBtn')?.addEventListener('click', () => renderOffer());
            document.getElementById('backStepsBtn')?.addEventListener('click', () => { if (stepHistory.length) currentStep = stepHistory.pop(); else if (currentStep > 0) currentStep--; renderStep(); });
            document.getElementById('homeStepsBtn')?.addEventListener('click', showHome);
            homeDiv.classList.add('hidden'); dynamicDiv.classList.remove('hidden');
        }
    }

    function renderOffer() {
        let html = `<div class="meditation-card offer-card"><div class="med-title">🔑 Остальные 3 ключа</div><div class="med-sub">${OFFER.keys.join('<br>')}<br><br>${OFFER.bundle}<br><br>Каждый ключ = аудиомедитация + шаги + картинки</div><div class="note">Платная версия — через @tochka_opory_bot</div><button id="offerHome" class="back-home">← на главную</button></div>`;
        dynamicDiv.innerHTML = html;
        document.getElementById('offerHome')?.addEventListener('click', showHome);
        homeDiv.classList.add('hidden'); dynamicDiv.classList.remove('hidden');
    }

    function openKey1() { currentStep = 0; stepHistory = []; renderStep(); }
    function openLocked(key) { dynamicDiv.innerHTML = `<div class="meditation-card"><div class="med-title">🔒 ${key}</div><div class="med-sub">Ключ не активирован. Доступ по ссылке.</div><button class="back-home" id="lockedHome">← на главную</button></div>`; document.getElementById('lockedHome')?.addEventListener('click', showHome); homeDiv.classList.add('hidden'); dynamicDiv.classList.remove('hidden'); }

    document.querySelectorAll('.key-card').forEach(card => {
        card.addEventListener('click', () => {
            const k = card.dataset.key;
            if (k === 'key1') openKey1();
            else if (k === 'key2') openLocked('КЛЮЧ 2 · Золотое сияние');
            else if (k === 'key3') openLocked('КЛЮЧ 3 · Искусство быть');
            else if (k === 'key4') openLocked('КЛЮЧ 4 · Субстрат жизненности');
        });
    });

    if (window.Telegram?.WebApp) { window.Telegram.WebApp.ready(); window.Telegram.WebApp.expand(); }
</script>
</body>
</html>
