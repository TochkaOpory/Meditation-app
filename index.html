<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Точка опоры | Не волшебная таблетка, но близко</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #FEF9EF;
            font-family: 'Inter', sans-serif;
            color: #2C2B28;
            min-height: 100vh;
            padding: 24px 20px 60px;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* шапка */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 600;
            background: linear-gradient(135deg, #C6A43B 0%, #E8D194 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .tagline {
            font-size: 14px;
            font-weight: 400;
            color: #A18C68;
            margin-top: 6px;
            font-style: italic;
        }

        /* сетка 2x2 */
        .grid-2x2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 32px 0 24px;
        }
        .key-card {
            background: rgba(255, 251, 240, 0.9);
            backdrop-filter: blur(2px);
            border-radius: 32px;
            padding: 24px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid #F3E9D2;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
        }
        .key-card:hover {
            transform: translateY(-4px);
            background: #FFFCF5;
            border-color: #EADCA8;
        }
        .key-number {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 700;
            color: #C6A43B;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .key-name {
            font-size: 15px;
            font-weight: 500;
            color: #4A4232;
        }

        /* карточка медитации */
        .meditation-card {
            background: #FFFFFFE6;
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 28px 20px;
            margin: 16px 0;
            border: 1px solid #F2E5CD;
            animation: fadeScale 0.25s ease;
        }
        @keyframes fadeScale {
            from { opacity: 0; transform: scale(0.97); }
            to { opacity: 1; transform: scale(1); }
        }
        .med-title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 600;
            color: #C6A43B;
            margin-bottom: 8px;
        }
        .med-sub {
            font-size: 14px;
            color: #A9946C;
            margin-bottom: 20px;
            border-left: 2px solid #EADCA8;
            padding-left: 12px;
        }
        .audio-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0 12px;
            flex-wrap: wrap;
        }
        .btn-audio {
            background: #C6A43B;
            border: none;
            color: white;
            font-weight: 600;
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 15px;
            cursor: pointer;
        }
        .btn-audio-outline {
            background: transparent;
            border: 1px solid #DCCFAD;
            color: #7F6B42;
        }
        .btn-audio:hover { background: #B48C2E; transform: scale(0.97); }
        .speed-slider {
            flex: 1;
            min-width: 120px;
        }
        .speed-label {
            font-size: 13px;
            font-weight: 500;
            color: #B29A64;
            margin-right: 8px;
        }
        input[type="range"] {
            width: 140px;
            accent-color: #C6A43B;
        }
        .progress-text {
            font-size: 13px;
            color: #AD9A74;
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
        }
        .back-home, .back-step {
            background: none;
            border: none;
            color: #B29B65;
            font-size: 14px;
            margin-top: 20px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-right: 16px;
        }
        .offer-card {
            background: #FEF7E6;
            border-radius: 40px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #EADCA8;
        }
        .price { font-size: 26px; font-weight: 700; color: #C6A43B; }
        .old-price { font-size: 16px; text-decoration: line-through; color: #B59F71; }
        .note { font-size: 11px; color: #BCAA86; text-align: center; margin-top: 20px; }
        .hidden { display: none; }
        button { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
<div class="app-container" id="app">
    <div class="header">
        <div class="brand">Точка опоры</div>
        <div class="tagline">«Не волшебная таблетка, но близко»</div>
    </div>

    <!-- главный экран с 4 ключами -->
    <div id="homeScreen">
        <div class="grid-2x2">
            <div class="key-card" data-key="key1"><div class="key-number">КЛЮЧ 1</div><div class="key-name">5 врат</div></div>
            <div class="key-card" data-key="key2"><div class="key-number">КЛЮЧ 2</div><div class="key-name">Золотое сияние</div></div>
            <div class="key-card" data-key="key3"><div class="key-number">КЛЮЧ 3</div><div class="key-name">Искусство быть</div></div>
            <div class="key-card" data-key="key4"><div class="key-number">КЛЮЧ 4</div><div class="key-name">Субстрат жизненности</div></div>
        </div>
        <div class="note">нажмите на ключ, чтобы начать практику</div>
    </div>

    <div id="dynamicPanel" class="hidden"></div>
</div>

<script>
    // ---------- ПРЯМЫЕ ССЫЛКИ ИЗ MEGA (embed → прямой mp3) ----------
    const AUDIO_URLS = {
        setup: "https://mega.nz/embed/2owzxTbY#dDHe-2H84CrL06s9JnNiQ-m0VJBnlaXpAUpvVbfvrxs!1v1c",
        key1: "https://mega.nz/embed/voZCwaKC#RZ-EwlCl_mnS7RGUI-PcV8m2CdUfk3uJO4ucccAExFs!1v1c",
        integration: "https://mega.nz/embed/K5QTAb6C#uVQY0VnJHJYjNe-_mM6Gw01702Xnc_ePM5UOTPmzPc4!1v1c",
        bonus: "https://mega.nz/embed/SkJRmYQA#IzBu52whsEWoELOhVWFFHijg_1aYkJvAGkntANxcmxM!1v1c"
    };

    // Бесплатные шаги для КЛЮЧА 1
    const FREE_STEPS = [
        { id: "welcome", type: "welcome" },
        { id: "setup", type: "audio", title: "🎧 Настройка (3 минуты)", desc: "Слушайте перед медитацией.", audioKey: "setup", nextText: "ДАЛЕЕ" },
        { id: "key1", type: "audio", title: "🔑 КЛЮЧ 1 · 5 врат (10 минут)", desc: "Наденьте наушники. Закройте глаза. Дышите свободно.", audioKey: "key1", nextText: "ДАЛЕЕ" },
        { id: "integration", type: "audio", title: "🧩 Интеграция (7 минут)", desc: "Закрепите состояние.", audioKey: "integration", nextText: "ДАЛЕЕ" },
        { id: "threeSteps", type: "steps" }
    ];

    // Оффер (ключи 2,3,4)
    const OFFER = {
        keys: [
            { name: "✨ Ключ 2. Золотое сияние", price: "890 ₽" },
            { name: "🧘 Ключ 3. Искусство быть", price: "1390 ₽" },
            { name: "🌱 Ключ 4. Субстрат жизненности", price: "1890 ₽" }
        ],
        bundle: { name: "Все три ключа (2+3+4)", price: "2990 ₽", oldPrice: "4170 ₽" }
    };

    let currentStepIndex = 0;
    let audioPlayer = null;
    let currentSpeed = 1.0;
    let freeStepHistory = []; // история для кнопки "Назад"

    const homeScreen = document.getElementById('homeScreen');
    const dynamicPanel = document.getElementById('dynamicPanel');

    function showHome() {
        dynamicPanel.classList.add('hidden');
        dynamicPanel.innerHTML = '';
        homeScreen.classList.remove('hidden');
        if (audioPlayer) { audioPlayer.pause(); audioPlayer = null; }
    }

    function createAudioPlayer(audioUrl, onEndedCallback) {
        const container = document.createElement('div');
        const audioElem = document.createElement('audio');
        audioElem.src = audioUrl;
        audioElem.preload = 'metadata';
        const speedSlider = document.createElement('input');
        speedSlider.type = 'range';
        speedSlider.min = 0.5;
        speedSlider.max = 2.0;
        speedSlider.step = 0.05;
        speedSlider.value = currentSpeed;
        const speedValue = document.createElement('span');
        speedValue.innerText = `${currentSpeed}x`;
        speedSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            audioElem.playbackRate = val;
            currentSpeed = val;
            speedValue.innerText = `${val.toFixed(2)}x`;
        });

        const playBtn = document.createElement('button');
        playBtn.innerText = '▶ Слушать';
        playBtn.className = 'btn-audio';
        playBtn.addEventListener('click', () => audioElem.play().catch(e => console.log));
        const pauseBtn = document.createElement('button');
        pauseBtn.innerText = '⏸ Пауза';
        pauseBtn.className = 'btn-audio-outline btn-audio';
        pauseBtn.addEventListener('click', () => audioElem.pause());

        const row = document.createElement('div');
        row.className = 'audio-row';
        row.appendChild(playBtn);
        row.appendChild(pauseBtn);
        const speedDiv = document.createElement('div');
        speedDiv.className = 'speed-slider';
        speedDiv.innerHTML = '<span class="speed-label">скорость</span> ';
        speedDiv.appendChild(speedSlider);
        speedDiv.appendChild(speedValue);
        row.appendChild(speedDiv);
        container.appendChild(row);
        container.appendChild(audioElem);

        audioElem.addEventListener('ended', () => { if (onEndedCallback) onEndedCallback(); });
        audioPlayer = audioElem;
        return container;
    }

    function renderFreeStep() {
        const step = FREE_STEPS[currentStepIndex];
        if (!step) { renderOfferScreen(); return; }

        if (step.type === 'welcome') {
            dynamicPanel.innerHTML = `
                <div class="meditation-card">
                    <div class="med-title">👋 Здравствуйте. Меня зовут Михаил</div>
                    <div class="med-sub">Основатель школы Точка опоры.<br><br>«Не волшебная таблетка, но близко» — значит, цените честность.<br><br>Что получите:<br>🎧 3 мин — настройка<br>🎧 10 мин — Ключ №1<br>🎧 7 мин — интеграция<br>🎁 бонус-подкаст «5 врат»<br>📝 3 шага к почти волшебству</div>
                    <button id="welcomeNext" class="btn-audio">ДА</button>
                    <button class="back-home" id="welcomeHome">← на главную</button>
                </div>
            `;
            document.getElementById('welcomeNext')?.addEventListener('click', () => {
                freeStepHistory.push(currentStepIndex);
                currentStepIndex++;
                renderFreeStep();
            });
            document.getElementById('welcomeHome')?.addEventListener('click', showHome);
            homeScreen.classList.add('hidden');
            dynamicPanel.classList.remove('hidden');
            return;
        }
        if (step.type === 'audio') {
            dynamicPanel.innerHTML = `
                <div class="meditation-card">
                    <div class="med-title">${step.title}</div>
                    <div class="med-sub">${step.desc}</div>
                    <div id="audioPlaceholder"></div>
                    <div class="progress-text"><span>прогресс практики</span><span id="stepCounter">${currentStepIndex+1}/${FREE_STEPS.length}</span></div>
                    <button id="nextStepBtn" class="btn-audio" style="margin-top:12px;">${step.nextText}</button>
                    <div><button class="back-step" id="backStepBtn">← Назад</button><button class="back-home" id="backHomeAudio">На главную</button></div>
                </div>
            `;
            const placeholder = document.getElementById('audioPlaceholder');
            const audioWidget = createAudioPlayer(AUDIO_URLS[step.audioKey], () => {});
            placeholder.appendChild(audioWidget);
            document.getElementById('nextStepBtn').addEventListener('click', () => {
                freeStepHistory.push(currentStepIndex);
                currentStepIndex++;
                renderFreeStep();
            });
            document.getElementById('backStepBtn').addEventListener('click', () => {
                if (freeStepHistory.length > 0) {
                    currentStepIndex = freeStepHistory.pop();
                    renderFreeStep();
                } else if (currentStepIndex > 0) {
                    currentStepIndex--;
                    renderFreeStep();
                } else showHome();
            });
            document.getElementById('backHomeAudio').addEventListener('click', showHome);
            homeScreen.classList.add('hidden');
            dynamicPanel.classList.remove('hidden');
            return;
        }
        if (step.type === 'steps') {
            dynamicPanel.innerHTML = `
                <div class="meditation-card">
                    <div class="med-title">📝 Три шага к почти волшебству</div>
                    <div class="med-sub">1. Запишите одно ощущение после практики.<br>2. Спросите: «Что я могу сделать, чтобы продлить это состояние?»<br>3. Сделайте это.</div>
                    <button id="bonusPlay" class="btn-audio-outline btn-audio" style="margin-top:8px;">🎁 Забрать бонус-подкаст «5 врат»</button>
                    <button id="finishToOffer" class="btn-audio" style="margin-top:16px;">→ КЛЮЧИ</button>
                    <div><button class="back-step" id="backStepsPrev">← Назад</button><button class="back-home" id="backHomeSteps">На главную</button></div>
                </div>
            `;
            document.getElementById('bonusPlay')?.addEventListener('click', () => {
                const win = window.open(AUDIO_URLS.bonus, '_blank');
                if (!win) alert('Откройте ссылку вручную: ' + AUDIO_URLS.bonus);
            });
            document.getElementById('finishToOffer')?.addEventListener('click', renderOfferScreen);
            document.getElementById('backStepsPrev')?.addEventListener('click', () => {
                if (freeStepHistory.length) currentStepIndex = freeStepHistory.pop();
                else if (currentStepIndex > 0) currentStepIndex--;
                renderFreeStep();
            });
            document.getElementById('backHomeSteps')?.addEventListener('click', showHome);
            homeScreen.classList.add('hidden');
            dynamicPanel.classList.remove('hidden');
        }
    }

    function renderOfferScreen() {
        let html = `<div class="meditation-card offer-card"><div class="med-title">🔑 Остальные 3 ключа</div><div class="med-sub">Вы прошли КЛЮЧ 1. Теперь выберите углубление:</div>`;
        OFFER.keys.forEach(k => { html += `<div style="margin:12px 0;"><strong>${k.name}</strong> — ${k.price}</div>`; });
        html += `<div><strong>🎁 ${OFFER.bundle.name}</strong> — ${OFFER.bundle.price} <span class="old-price">${OFFER.bundle.oldPrice}</span> (экономия 1480₽)</div>`;
        html += `<div class="note" style="margin-top:20px;">Платная версия — через @tochka_opory_bot</div><button class="back-home" id="offerBackHome">← на главную</button></div>`;
        dynamicPanel.innerHTML = html;
        document.getElementById('offerBackHome')?.addEventListener('click', showHome);
        homeScreen.classList.add('hidden');
        dynamicPanel.classList.remove('hidden');
    }

    function openKey1() { currentStepIndex = 0; freeStepHistory = []; renderFreeStep(); }
    function openLockedKey(keyName, price) {
        dynamicPanel.innerHTML = `<div class="meditation-card"><div class="med-title">🔒 ${keyName}</div><div class="med-sub">Ключ не активирован. Стоимость: ${price}</div><button id="buyKey" class="btn-audio">💰 Приобрести</button><button class="back-home" id="closeLocked">← на главную</button></div>`;
        document.getElementById('buyKey')?.addEventListener('click', () => alert('Оплата через Telegram Stars / Tribute. Свяжитесь с @tochka_opory_bot'));
        document.getElementById('closeLocked')?.addEventListener('click', showHome);
        homeScreen.classList.add('hidden');
        dynamicPanel.classList.remove('hidden');
    }

    document.querySelectorAll('.key-card').forEach(card => {
        card.addEventListener('click', () => {
            const key = card.dataset.key;
            if (key === 'key1') openKey1();
            else if (key === 'key2') openLockedKey('КЛЮЧ 2 · Золотое сияние', '890 ₽');
            else if (key === 'key3') openLockedKey('КЛЮЧ 3 · Искусство быть', '1390 ₽');
            else if (key === 'key4') openLockedKey('КЛЮЧ 4 · Субстрат жизненности', '1890 ₽');
        });
    });

    if (window.Telegram?.WebApp) { window.Telegram.WebApp.ready(); window.Telegram.WebApp.expand(); }
</script>
</body>
</html>
